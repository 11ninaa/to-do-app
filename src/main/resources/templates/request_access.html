<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Барање Пристап (JIT)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #42a5f5;
            --light-blue: #e3f2fd;
            --dark-blue: #1565c0;
            --shadow-color: rgba(66, 165, 245, 0.2);
        }
        body {
            background-color: var(--light-blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .modern-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow-color);
            padding: 40px;
            width: 100%;
        }
        .btn-custom {
            background-color: var(--primary-blue);
            border: none;
            border-radius: 15px;
            font-weight: bold;
        }
        .btn-custom:hover {
            background-color: var(--dark-blue);
        }
    </style>
</head>
<body>

<div class="modern-card" style="max-width: 500px;">
    <h2 class="text-center mb-4" style="color: var(--dark-blue); font-weight: bold;">
        <i class="bi bi-key-fill me-2"></i> Барање JIT Пристап
    </h2>

    <p class="text-center text-muted">
        Овде можете да побарате привремена дозвола за управување со задачи.
    </p>

    <div th:if="${canWrite}" class="alert alert-success text-center">
        <i class="bi bi-check-circle-fill me-2"></i>
        Веќе имате активна `TASK_WRITER` улога.
    </div>

    <div th:if="${!canWrite}" class="card p-4 mt-4">
        <form method="post" th:action="@{/request-access}">
            <h5 class="mb-3">Побарај улога: `TASK_WRITER`</h5>
            <p>
                Ова ќе ви додели дозвола за додавање задачи за 10 минути(Just-in-Time). Потоа, привилегијата автоматски ќе се одземе.
            </p>
            <button type="submit" class="btn btn-custom btn-lg w-100 text-white mt-3">
                Активирај Пристап (10 мин.)
            </button>
        </form>
    </div>

    <div class="mt-4 text-center">
        <a href="/todo" style="color: var(--primary-blue); text-decoration: none; font-weight: bold;">
            <i class="bi bi-arrow-left"></i> Врати се на задачите
        </a>
    </div>
</div>

</body>
</html>
