<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрација</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <style>
        :root {
            --primary-blue: #42a5f5;
            --light-blue: #e3f2fd;
            --dark-blue: #1565c0;
            --shadow-color: rgba(66, 165, 245, 0.2);
        }
        body {
            background-color: var(--light-blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .modern-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow-color);
            padding: 40px;
            width: 100%;
        }
        .btn-custom {
            background-color: var(--primary-blue);
            border: none;
            border-radius: 15px;
            font-weight: bold;
        }
        .btn-custom:hover {
            background-color: var(--dark-blue);
        }
        .form-control {
            border-radius: 12px;
            border-color: #bbdefb;
        }
    </style>
</head>
<body>

<div class="modern-card" style="max-width: 450px;">
    <h2 class="text-center mb-4" style="color: var(--dark-blue); font-weight: bold;">
        <i class="bi bi-person-plus-fill me-2"></i> Регистрирај се
    </h2>

    <form method="post" th:action="@{/register}">

        <div class="mb-4">
            <label class="form-label" style="color: var(--dark-blue);">Корисничко име</label>
            <input type="text"
                   name="username"
                   placeholder="Избери корисничко име"
                   required
                   class="form-control form-control-lg"
                   th:value="${oldUsername}">
        </div>

        <div class="mb-4">
            <label class="form-label" style="color: var(--dark-blue);">Е-пошта</label>
            <input type="email"
                   name="email"
                   placeholder="Внесете валидна е-пошта"
                   required
                   class="form-control form-control-lg"
                   th:value="${oldEmail}">
        </div>

        <div class="mb-4">
            <label class="form-label" style="color: var(--dark-blue);">Лозинка</label>
            <input type="password"
                   name="password"
                   placeholder="Избери силна лозинка"
                   required
                   class="form-control form-control-lg">
        </div>

        <button type="submit" class="btn btn-custom btn-lg w-100 mt-2 text-white">
            Креирај Сметка
        </button>
    </form>

    <p th:if="${error}" class="text-danger mt-3 text-center" th:text="${error}"></p>

    <div class="mt-4 text-center">
        <span style="color: #616161;">Веќе имаш сметка? </span>
        <a th:href="@{/login}" style="color: var(--primary-blue); text-decoration: none; font-weight: bold;">
            Најави се
        </a>
    </div>
</div>

</body>
</html>
