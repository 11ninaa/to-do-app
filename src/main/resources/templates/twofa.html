<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Дво-факторска автентикација</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container" style="max-width: 480px; margin-top: 80px;">
    <h3 class="mb-4">Внесете 6-цифрен код од вашата е-пошта</h3>
    <p th:if="${error}" class="text-danger" th:text="${error}"></p>
    <form method="post" th:action="@{/twofa}">
        <div class="mb-3">
            <label class="form-label">Код</label>
            <input type="text" name="code" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Потврди</button>
    </form>
</div>
</body>
</html>
