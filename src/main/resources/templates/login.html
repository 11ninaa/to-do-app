<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Најава</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <style>
        :root {
            --primary-blue: #42a5f5;
            --light-blue: #e3f2fd;
            --dark-blue: #1565c0;
            --shadow-color: rgba(66, 165, 245, 0.2);
        }
        body {
            background-color: var(--light-blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .modern-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow-color);
            padding: 40px;
            width: 100%;
        }
        .btn-custom {
            background-color: var(--primary-blue);
            border: none;
            border-radius: 15px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-custom:hover {
            background-color: var(--dark-blue);
        }
        .form-control {
            border-radius: 12px;
            border-color: #bbdefb;
        }
    </style>
</head>
<body>

<div class="modern-card" style="max-width: 450px;">
    <h2 class="text-center mb-4" style="color: var(--dark-blue); font-weight: bold;">
        <i class="bi bi-person-circle me-2"></i> Најава
    </h2>

    <form method="post" th:action="@{/login}">
        <div class="mb-4">
            <label for="username" class="form-label" style="color: var(--dark-blue);">Корисничко име</label>
            <input type="text" name="username" id="username" placeholder="Внесете корисничко име" required class="form-control form-control-lg">
        </div>
        <div class="mb-4">
            <label for="password" class="form-label" style="color: var(--dark-blue);">Лозинка</label>
            <input type="password" name="password" id="password" placeholder="Внесете лозинка" required class="form-control form-control-lg">
        </div>

        <button type="submit" class="btn btn-custom btn-lg w-100 mt-2 text-white">
            Најави се
        </button>
    </form>

    <p th:if="${error}" class="text-danger mt-3 text-center" th:text="${error}"></p>

    <div class="mt-4 text-center">
        <span style="color: #616161;">Немаш сметка? </span>
        <a th:href="@{/register}" style="color: var(--primary-blue); text-decoration: none; font-weight: bold;">Регистрирај се</a>
    </div>
</div>

</body>
</html>
