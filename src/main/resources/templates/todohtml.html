<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>To-Do Апликација</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">

  <style>
    :root {
      --primary-blue: #42a5f5;
      --light-blue: #e3f2fd;
      --dark-blue: #1565c0;
      --shadow-color: rgba(66, 165, 245, 0.2);
    }
    body {
      background-color: var(--light-blue);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .modern-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      box-shadow: 0 8px 32px var(--shadow-color);
      padding: 40px;
      width: 100%;
    }
    .btn-custom {
      background-color: var(--primary-blue);
      border: none;
      border-radius: 15px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .btn-custom:hover {
      background-color: var(--dark-blue);
    }
    .form-control {
      border-radius: 12px;
      border-color: #bbdefb;
    }
    .list-group-item {
      border: 1px solid #bbdefb;
      border-radius: 12px !important;
      margin-bottom: 10px;
      padding: 15px;
      transition: box-shadow 0.3s;
    }
    .list-group-item:hover {
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .delete-btn-custom {
      background-color: #ff8a80;
      color: white;
      border-radius: 10px;
    }
    .delete-btn-custom:hover {
      background-color: #d32f2f;
      color: white;
    }
  </style>
</head>
<body>

<div class="modern-card" style="max-width: 600px;">
  <h2 class="text-center mb-5" style="color: var(--dark-blue); font-weight: bold;">
    <i class="bi bi-list-task me-2"></i> To-Do Листа
  </h2>

  <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
  <div th:if="${info}" class="alert alert-success mt-3" th:text="${info}"></div>

  <form method="post" th:action="@{/todo/add}" class="input-group mb-4">
    <input type="text"
           name="description"
           placeholder="Нова задача"
           required
           class="form-control form-control-lg"
           th:disabled="${!canWrite}">
    <button type="submit"
            class="btn btn-custom btn-lg text-white"
            th:disabled="${!canWrite}">
      <i class="bi bi-plus-lg"></i> Додај
    </button>
  </form>

  <div th:if="${!canWrite}" class="text-center mb-4">
    <small class="text-muted">
      <i class="bi bi-lock-fill me-1"></i>
      Немате дозвола за пишување.
      <a th:href="@{/request-access}" style="color: var(--primary-blue); font-weight: bold;">
        Добијте 10-минутна JIT дозвола.
      </a>
    </small>
  </div>

  <ul class="list-group list-group-flush">
    <div th:if="${tasks.isEmpty()}" class="text-center text-muted">
      <p>Немате активни задачи.</p>
    </div>
    <li th:each="task : ${tasks}" class="list-group-item d-flex justify-content-between align-items-center">
      <span th:text="${task.description}" style="color: #424242; font-size: 1.1em;"></span>

      <a th:href="@{'/todo/delete/' + ${task.id}}" class="btn btn-sm delete-btn-custom">
        <i class="bi bi-trash-fill"></i>
      </a>
    </li>
  </ul>

  <hr class="my-4">
  <div class="text-center">
    <a th:href="@{/logout}" class="btn btn-outline-secondary btn-custom" style="background-color: transparent; color: var(--primary-blue); border: 2px solid var(--primary-blue);">
      Одјави се
    </a>
  </div>
</div>

</body>
</html>
