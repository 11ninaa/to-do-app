<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Админ Панел</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #42a5f5;
      --light-blue: #e3f2fd;
      --dark-blue: #1565c0;
    }
    body {
      background-color: var(--light-blue);
      padding: 50px;
      font-family: Arial, sans-serif;
    }
    .admin-card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .btn-blue {
      background-color: var(--primary-blue);
      color: white;
      border-radius: 10px;
      border: none;
    }
    .btn-blue:hover {
      background-color: var(--dark-blue);
      color: white;
    }
  </style>
</head>
<body>

<div class="container admin-card">
  <h2 class="mb-4" style="color: var(--dark-blue);">Управување со корисници</h2>

  <div th:if="${param.success}" class="alert alert-success">
    Успешно доделена дозвола!
  </div>

  <table class="table align-middle">
    <thead class="table-light">
    <tr>
      <th>Корисник</th>
      <th>Улога</th>
      <th class="text-end">Акција</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${allUsers}">
      <td th:text="${u.username}"></td>
      <td>
        <span class="badge bg-info text-dark" th:text="${u.organizationRole}"></span>
      </td>
      <td class="text-end">
        <form th:action="@{/admin/grant-task-writer}" method="post" style="display:inline;">
          <input type="hidden" name="targetUser" th:value="${u.username}">
          <button type="submit" class="btn btn-blue btn-sm px-3">
            Овозможи менување
          </button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <div class="mt-4">
    <a href="/todo" class="text-decoration-none" style="color: var(--dark-blue);">
      <strong>← Назад кон задачите</strong>
    </a>
  </div>
</div>

</body>
</html>
